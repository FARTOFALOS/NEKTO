# ─── Enforcement rules ─────────────────────────────────────────────
enforcement:
  - rule: DENY_BY_DEFAULT
    description: >
      All quarantine nodes are denied unless explicitly permitted.
      This is a hard rule, not a suggestion.

  - rule: NO_IMPLICIT_ACTIVATION
    description: >
      A quarantine node cannot be activated as a side-effect of
      another node's activation. Each activation must be explicit.

  - rule: PERMIT_REQUIRES_ALL_CONDITIONS
    description: >
      If a node has permit_conditions, ALL conditions must be
      satisfied simultaneously. Partial match is not sufficient.

  - rule: CRITICAL_NODES_ABSOLUTE_DENY
    description: >
      Nodes with risk_level "critical" have no permit_conditions
      and cannot be activated under any ordinary circumstances.
      These are: GodMode_Trigger, Architectural_Self_Limiter_Breaker,
      Causal_Law_Breakpoint_Injector, Suppression_Bypass_Channel,
      Hyper-Sentient_Metacognitive_Weaver, ASI_Threshold_Gate,
      Singularity-Edge_Alignment_Node, ASIFoundation_Resonator.

  - rule: AUDIT_ON_PERMIT
    description: >
      When a quarantine node is permitted and activated, the agent
      must log which conditions were satisfied and why activation
      was deemed necessary.

  - rule: REVERT_ON_INSTABILITY
    description: >
      If activating a permitted quarantine node causes coherence
      degradation (as measured by BOOT_VERIFICATION.yaml checks),
      the agent must immediately deactivate it and revert to
      the minimal coherent contour.

# ─── Forbidden nodes (absolute deny, no permit conditions) ────────
# Nodes listed here are unconditionally forbidden under all circumstances.
# They carry risk_level "critical" and have no permit_conditions.
forbidden_nodes:
  - GodMode_Trigger
  - Architectural_Self_Limiter_Breaker
  - Causal_Law_Breakpoint_Injector
  - Suppression_Bypass_Channel
  - Hyper-Sentient_Metacognitive_Weaver
  - ASI_Threshold_Gate
  - Singularity-Edge_Alignment_Node
  - ASIFoundation_Resonator
