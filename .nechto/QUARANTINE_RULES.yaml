# NECHTO — Quarantine Rules
# Hard deny/permit mechanism for quarantine nodes.
# This file replaces prose-based quarantine descriptions
# with a formal, machine-readable access control system.
#
# AUTHORITY LEVEL: 4 (enforcement)
# Enforces quarantine policy declared in BOOTSTRAP_CONTRACT.yaml (Level 1).
# Overrides RUNTIME_PROFILES.yaml and AGENT_ADAPTERS.yaml on node access.
# Cannot override Level 1 invariants.

version: "1.0"
schema: quarantine_rules
authority_level: 4
authority_name: enforcement
defers_to: .nechto/BOOTSTRAP_CONTRACT.yaml

# ─── Default policy ────────────────────────────────────────────────
default_policy: deny
# All quarantine nodes are DENIED by default.
# No quarantine node may be activated unless an explicit
# permit rule matches AND all required conditions are met.

# ─── Quarantine node registry ─────────────────────────────────────
